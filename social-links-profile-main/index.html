<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
        rel="stylesheet">
    <title>Document</title>
    <style>
        :root {
            --Green: hsl(75, 94%, 57%);
            --White: hsl(0, 0%, 100%);
            --Grey700: hsl(0, 0%, 20%);
            --Grey800: hsl(0, 0%, 12%);
            --Grey900: hsl(0, 0%, 8%);
        }
        
        body {
            background-color: var(--Grey900);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--White);
            font-family: 'Inter', sans-serif;
        }
        p{
            font-size: 14px;
        }
        @media all and (width >=375px) {
            .card {
                text-align: center;
                background-color: var(--Grey800);
                width: 350px;
                border-radius: 10px;
                padding: 50px 20px;
                margin-top: 50px;
                box-sizing: border-box;
            }

            .card img {
                border-radius: 50%;
                width: 90px;
                height: 90px;
            }

            .card a {
                background-color: var(--Grey700);
                width: 100%;
                display: block;
                color: var(--White);
                text-decoration: none;
                border-radius: 6px;
                /* height: 60px; */
                padding: 15px 0;
                box-sizing: border-box;
                margin-bottom: 20px;
            }

            .card a:hover {
                background-color: var(--Green);
                color: var(--Grey900);
            }
        }
        @media all and (width < 375px) {
            .card {
                text-align: center;
                background-color: var(--Grey800);
                width: 250px;
                border-radius: 10px;
                padding: 50px 20px;
                margin-top: 50px;
                box-sizing: border-box;
            }

            .card img {
                border-radius: 50%;
                width: 90px;
                height: 90px;
            }

            .card a {
                background-color: var(--Grey700);
                width: 100%;
                display: block;
                color: var(--White);
                text-decoration: none;
                border-radius: 6px;
                padding: 15px 0;
                box-sizing: border-box;
                margin-bottom: 20px;
            }

            .card a:hover {
                background-color: var(--Green);
                color: var(--Grey900);
            }
            .card a:focus-visible {
                outline: 2px solid var(--Green);
                outline-offset: 3px;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <img src="assets/images/avatar-jessica.jpeg" alt="Portrait of Jessica Randall">
        <h1 style="font-weight: 700;margin-bottom: -15px;">Jessica Randall</h1>
        <p style="color: var(--Green);font-weight: 600;">London, United kingdom</p>
        <p style="font-weight: 400;">"Front-end developer and avid reader"</p>
        <div class="links">
            <a href="">GitHub</a>
            <a href="">Frontend Mentor</a>
            <a href="">LinkedIn</a>
            <a href="">Twitter</a>
            <a href="">Instagram</a>
        </div>
    </div>
</body>

</html>
